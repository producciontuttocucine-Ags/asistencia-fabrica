<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #f5c842;
    --accent2: #e8f542;
    --text: #f0f0f0;
    --muted: #888;
    --entrada: #42f587;
    --salida: #f54242;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: var(--display);
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .header-logo span { color: var(--text); }

  /* =====================
     REGISTRO PAGE
  ===================== */
  .registro-container {
    max-width: 480px;
    margin: 3rem auto;
    padding: 0 1.5rem;
  }
  .registro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: fadeIn 0.4s ease;
  }
  .registro-header {
    background: linear-gradient(135deg, #1a1a1a 0%, #242424 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem;
    text-align: center;
  }
  .registro-icon {
    width: 64px;
    height: 64px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 1.8rem;
  }
  .registro-title {
    font-family: var(--display);
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--accent);
  }
  .registro-date {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 1px;
  }
  .registro-body {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .form-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .form-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: var(--sans);
    font-size: 1rem;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    background: #1e1e1e;
  }
  .form-input::placeholder { color: var(--muted); }

  .tipo-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .tipo-btn {
    padding: 1rem;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .tipo-btn .tipo-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
  .tipo-btn .tipo-label {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
  }
  .tipo-btn.entrada-btn.selected {
    border-color: var(--entrada);
    background: rgba(66,245,135,0.1);
    color: var(--entrada);
  }
  .tipo-btn.salida-btn.selected {
    border-color: var(--salida);
    background: rgba(245,66,66,0.1);
    color: var(--salida);
  }
  .tipo-btn:hover:not(.selected) {
    border-color: var(--muted);
    background: var(--surface);
  }

  .btn-registrar {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: var(--display);
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .btn-registrar:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-registrar:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.entrada-toast { border-color: var(--entrada); }
  .toast.salida-toast { border-color: var(--salida); }
  .toast.error-toast { border-color: #f5a742; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">CONTROL<span> ASISTENCIA</span></div>
</header>

<div class="registro-container">
  <div class="registro-card">
    <div class="registro-header">
      <div class="registro-icon">🏭</div>
      <div class="registro-title">REGISTRO</div>
      <div class="registro-date" id="fecha-display"></div>
    </div>
    <div class="registro-body">
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input class="form-input" type="text" id="nombre-input" placeholder="Escribe tu nombre..." autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de registro</label>
        <div class="tipo-selector">
          <div class="tipo-btn entrada-btn selected" onclick="selectTipo('entrada')">
            <div class="tipo-icon">🟢</div>
            <span class="tipo-label">Entrada</span>
          </div>
          <div class="tipo-btn salida-btn" onclick="selectTipo('salida')">
            <div class="tipo-icon">🔴</div>
            <span class="tipo-label">Salida</span>
          </div>
        </div>
      </div>
      <button class="btn-registrar" id="btn-registrar" onclick="registrar()">REGISTRAR</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtqCch8Q1a-dXFLwGeyhpoZxZcxrGGQxaFuhKhSKpbltCI1jTXsvHC1zpmPjewSWcYLQ/exec';

  let tipoSeleccionado = 'entrada';

  function actualizarFecha() {
    const now = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const fecha = now.toLocaleDateString('es-MX', opts).toUpperCase();
    const hora = now.toLocaleTimeString('es-MX');
    document.getElementById('fecha-display').textContent = `${fecha} · ${hora}`;
  }
  actualizarFecha();
  setInterval(actualizarFecha, 1000);

  function selectTipo(tipo) {
    tipoSeleccionado = tipo;
    document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.' + tipo + '-btn').classList.add('selected');
  }

  async function registrar() {
    const nombre = document.getElementById('nombre-input').value.trim();
    if (!nombre) {
      showToast('⚠️', 'Escribe tu nombre primero', 'error');
      return;
    }

    const btn = document.getElementById('btn-registrar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>ENVIANDO...';

    const now = new Date();
    const payload = {
      nombre: nombre,
      tipo: tipoSeleccionado,
      fecha: now.toLocaleDateString('es-MX'),
      hora: now.toLocaleTimeString('es-MX')
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const icono = tipoSeleccionado === 'entrada' ? '✅' : '🔴';
      const tipo = tipoSeleccionado === 'entrada' ? 'Entrada' : 'Salida';
      showToast(icono, `${tipo} registrada — ${nombre}`, tipoSeleccionado);
      document.getElementById('nombre-input').value = '';

    } catch (err) {
      showToast('⚠️', 'Error de conexión, intenta de nuevo', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = 'REGISTRAR';
  }

  function showToast(icono, msg, tipo) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-icon').textContent = icono;
    document.getElementById('toast-msg').textContent = msg;
    toast.className = 'toast';
    if (tipo === 'entrada') toast.classList.add('entrada-toast');
    else if (tipo === 'salida') toast.classList.add('salida-toast');
    else toast.classList.add('error-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
